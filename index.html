    <!-- ═══ NAVIGATION ═══ -->

    <!-- ═══ PDF VIEWER MODAL (PDF.js) ═══ -->
    <div class="pdf-overlay" id="pdfOverlay">
        <div class="pdf-header">
            <h3 id="pdfTitle">DOCUMENT VIEWER</h3>
            <div class="pdf-nav">
                <button class="pdf-nav-btn" id="pdfPrev" onclick="pdfPrevPage()">← PREV</button>

                <button class="pdf-nav-btn" id="pdfNext" onclick="pdfNextPage()">NEXT →</button>
            </div>
            <button class="pdf-close" onclick="closePDF()">✕ CLOSE</button>
        </div>
        <div class="pdf-frame-wrap" id="pdfContainer">
            <div id="pdfCanvasWrap">
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>
        <p class="pdf-notice">🔒 Secured viewer — right-click disabled</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
